<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Randomizer</title>
    <link rel="stylesheet" href="style.css?v=6">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar for Filters -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 data-i18n="filter_title">필터 설정</h2>
                <p data-i18n="filter_desc">원하는 조건을 선택하세요</p>
            </div>

            <div class="filter-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;">
                    <h3 data-i18n="gen_title" style="margin: 0; border: none; padding: 0; font-size: 1rem;">세대 (Generation)</h3>
                    <div style="display: flex; gap: 4px;">
                        <button id="btn-gen-all" class="btn-small" style="padding: 4px 8px; font-size: 0.7rem;">전체</button>
                        <button id="btn-gen-none" class="btn-small" style="padding: 4px 8px; font-size: 0.7rem;">해제</button>
                    </div>
                </div>
                <div class="checkbox-grid" id="gen-filters">
                    <!-- Checkboxes generated by JS -->
                </div>
            </div>

            <div class="filter-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;">
                    <h3 data-i18n="type_title" style="margin: 0; border: none; padding: 0; font-size: 1rem;">타입 (Type)</h3>
                    <div style="display: flex; gap: 4px;">
                        <button id="btn-type-all" class="btn-small" style="padding: 4px 8px; font-size: 0.7rem;">전체</button>
                        <button id="btn-type-none" class="btn-small" style="padding: 4px 8px; font-size: 0.7rem;">해제</button>
                    </div>
                </div>
                <div class="checkbox-grid" id="type-filters">
                    <!-- Checkboxes generated by JS -->
                </div>
            </div>

            <div class="filter-section">
                <h3 data-i18n="special_title">특수 (Special)</h3>
                <div class="checkbox-grid">
                    <label class="custom-checkbox">
                        <input type="checkbox" id="filter-legendary" checked>
                        <span class="checkmark"></span>
                        <span data-i18n="filter_legendary">전설 포함</span>
                    </label>
                    <label class="custom-checkbox">
                        <input type="checkbox" id="filter-mythical" checked>
                        <span class="checkmark"></span>
                        <span data-i18n="filter_mythical">환상 포함</span>
                    </label>
                    <label class="custom-checkbox">
                        <input type="checkbox" id="filter-normal" checked>
                        <span class="checkmark"></span>
                        <span data-i18n="filter_normal">일반 포함</span>
                    </label>
                </div>
            </div>

            <div class="filter-section">
                <h3 data-i18n="option_title">옵션 설정</h3>
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <div class="input-group" style="display: flex; align-items: center; justify-content: space-between;">
                        <span data-i18n="lang_title" style="color: #cbd5e1; font-size: 0.9rem;">언어 (Language)</span>
                        <select id="lang-select" class="custom-select">
                            <option value="ko">한국어</option>
                            <option value="en">English</option>
                            <option value="ja">日本語</option>
                            <option value="zh-Hans">简体中文</option>
                            <option value="fr">Français</option>
                            <option value="it">Italiano</option>
                            <option value="es">Español</option>
                            <option value="de">Deutsch</option>
                        </select>
                    </div>
                    <div class="input-group" style="display: flex; align-items: center; justify-content: space-between;">
                        <span data-i18n="draw_count_title" style="color: #cbd5e1; font-size: 0.9rem;">뽑을 개수</span>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <input type="number" id="draw-count" min="1" max="6" value="1" class="number-input">
                            <span data-i18n="draw_count_unit" style="color: #cbd5e1; font-size: 0.8rem;">마리</span>
                        </div>
                    </div>
                    <div class="input-group" style="display: flex; align-items: center; justify-content: space-between;">
                        <span data-i18n="shiny_prob_title" style="color: #cbd5e1; font-size: 0.9rem;">이로치 확률</span>
                        <select id="shiny-prob" class="custom-select">
                            <option value="1/10">1/10 (테스트용)</option>
                            <option value="1/100">1/100</option>
                            <option value="1/512">1/512 (국제교배)</option>
                            <option value="1/1024">1/1024</option>
                            <option value="1/4096" selected>1/4096 (기본)</option>
                            <option value="1/8192">1/8192 (클래식)</option>
                            <option value="0">등장 안함 (0%)</option>
                            <option value="1">무조건 등장 (100%)</option>
                        </select>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="main-header">
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg" alt="Pokemon Logo" class="logo">
                <h1 data-i18n="main_title">랜덤 뽑기</h1>
            </header>

            <div class="view-area">
                <!-- Idle state with Pokeball button -->
                <div class="idle-state" id="idle-state">
                    <div class="pokeball-container">
                        <img id="btn-draw" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" class="pokeball-img" alt="Pokeball">
                    </div>
                    <p class="draw-instruction" data-i18n="draw_instruction">몬스터볼을 클릭해 포켓몬을 뽑아보세요!</p>
                </div>

                <!-- Loading State -->
                <div class="loading-state hidden" id="loading-state">
                    <div class="loading-spinner"></div>
                    <p data-i18n="loading_text">조건에 맞는 포켓몬을 찾는 중...</p>
                </div>

                <!-- Result Area -->
                <div class="result-state hidden" id="result-state">
                    <div class="cards-grid" id="cards-grid">
                        <!-- Cards will be generated here by JS -->
                    </div>
                    <div class="action-buttons" style="margin-top: 30px; text-align: center;">
                        <button class="btn-primary" id="btn-draw-again" data-i18n="btn_draw_again">다시 뽑기</button>
                    </div>
                </div>
            </div>
            
            <!-- Toast Notification -->
            <div id="toast" class="toast hidden"></div>
        </main>
    </div>

    <script src="script.js?v=6"></script>
</body>
</html>
