<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Randomizer</title>
    <link rel="stylesheet" href="style.css?v=6">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar for Filters -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>필터 설정</h2>
                <p>원하는 조건을 선택하세요</p>
                <div class="filter-actions">
                    <button id="btn-select-all" class="btn-small">전체 선택</button>
                    <button id="btn-deselect-all" class="btn-small">전체 해제</button>
                </div>
            </div>

            <div class="filter-section">
                <h3>세대 (Generation)</h3>
                <div class="checkbox-grid" id="gen-filters">
                    <!-- Checkboxes generated by JS -->
                </div>
            </div>

            <div class="filter-section">
                <h3>타입 (Type)</h3>
                <div class="checkbox-grid" id="type-filters">
                    <!-- Checkboxes generated by JS -->
                </div>
            </div>

            <div class="filter-section">
                <h3>특수 (Special)</h3>
                <div class="checkbox-grid">
                    <label class="custom-checkbox">
                        <input type="checkbox" id="filter-legendary" checked>
                        <span class="checkmark"></span>
                        전설 포함
                    </label>
                    <label class="custom-checkbox">
                        <input type="checkbox" id="filter-mythical" checked>
                        <span class="checkmark"></span>
                        환상 포함
                    </label>
                    <label class="custom-checkbox">
                        <input type="checkbox" id="filter-normal" checked>
                        <span class="checkmark"></span>
                        일반 포함
                    </label>
                </div>
            </div>

            <div class="filter-section">
                <h3>옵션 설정</h3>
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <div class="input-group" style="display: flex; align-items: center; justify-content: space-between;">
                        <span style="color: #cbd5e1; font-size: 0.9rem;">뽑을 개수</span>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <input type="number" id="draw-count" min="1" max="6" value="1" class="number-input">
                            <span style="color: #cbd5e1; font-size: 0.8rem;">마리</span>
                        </div>
                    </div>
                    <div class="input-group" style="display: flex; align-items: center; justify-content: space-between;">
                        <span style="color: #cbd5e1; font-size: 0.9rem;">이로치 확률</span>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <input type="number" id="shiny-prob" min="0" max="100" value="0.5" step="0.1" class="number-input">
                            <span style="color: #cbd5e1; font-size: 0.8rem;">%</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="main-header">
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg" alt="Pokemon Logo" class="logo">
                <h1>랜덤 뽑기</h1>
            </header>

            <div class="view-area">
                <!-- Idle state with Pokeball button -->
                <div class="idle-state" id="idle-state">
                    <div class="pokeball-container">
                        <img id="btn-draw" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" class="pokeball-img" alt="Pokeball">
                    </div>
                    <p class="draw-instruction">몬스터볼을 클릭해 포켓몬을 뽑아보세요!</p>
                </div>

                <!-- Loading State -->
                <div class="loading-state hidden" id="loading-state">
                    <div class="loading-spinner"></div>
                    <p>조건에 맞는 포켓몬을 찾는 중...</p>
                </div>

                <!-- Result Area -->
                <div class="result-state hidden" id="result-state">
                    <div class="cards-grid" id="cards-grid">
                        <!-- Cards will be generated here by JS -->
                    </div>
                    <div class="action-buttons" style="margin-top: 30px; text-align: center;">
                        <button class="btn-primary" id="btn-draw-again">다시 뽑기</button>
                    </div>
                </div>
            </div>
            
            <!-- Toast Notification -->
            <div id="toast" class="toast hidden">조건에 맞는 포켓몬을 찾을 수 없습니다. 필터를 완화해주세요.</div>
        </main>
    </div>

    <script src="script.js?v=6"></script>
</body>
</html>
